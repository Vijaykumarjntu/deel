<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}MiniDeel{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow p-4">
        <div class="container mx-auto flex justify-between">
            <a href="{% url 'home' %}" class="font-bold text-xl">MiniDeel</a>
            <div>
                {% if user.is_authenticated %}
                    <span>{{ user.email }}</span>
                    <a href="{% url 'logout' %}" class="ml-4 text-red-500">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mx-auto p-4">
        {% if messages %}
            {% for message in messages %}
                <div class="bg-green-100 p-3 mb-4 rounded">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
