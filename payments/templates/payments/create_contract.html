{% extends 'core/base.html' %}
{% block title %}Create Contract{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6">
    <h1 class="text-2xl font-bold mb-6">Create Contract for {{ contractor.full_name }}</h1>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Contract Title</label>
            <input type="text" name="title" required 
                   placeholder="e.g., Software Development Agreement"
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Description</label>
            <textarea name="description" rows="4" 
                      placeholder="Describe the work, scope, and terms..."
                      class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500"></textarea>
        </div>
        <!-- <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Select Contractor</label>
            <select name="contractor_id" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                <option value="">-- Select a Contractor --</option>
                {% for contractor in contractors %}
                <option value="{{ contractor.id }}">
                    {{ contractor.full_name }} ({{ contractor.user.email }}) - {{ contractor.get_country_display }}
                </option>
                {% endfor %}
            </select>
            {% if not contractors %}
            <p class="text-red-500 text-sm mt-1">
                No contractors found. <a href="{% url 'add_contractor' %}">Add a contractor first</a>
            </p>
            {% endif %}
        </div> -->
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-gray-700 font-bold mb-2">Hourly Rate (USD)</label>
                <input type="number" name="hourly_rate" step="0.01" min="1" required 
                       class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-gray-700 font-bold mb-2">Monthly Hours</label>
                <input type="number" name="monthly_hours" min="1" max="744" required 
                       value="40"
                       class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
            </div>
        </div>
        
        <div class="bg-gray-50 p-4 rounded mb-6">
            <h3 class="font-bold mb-2">Contract Preview</h3>
            <p class="text-sm text-gray-600">Monthly compensation: <span id="monthly-preview">$0</span> USD</p>
        </div>
        
        <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
            Generate Contract
        </button>
    </form>
    
    <a href="{% url 'contractor_list' %}" class="block text-center mt-4 text-gray-600">← Back</a>
</div>

<script>
    const hourlyRate = document.querySelector('[name="hourly_rate"]');
    const monthlyHours = document.querySelector('[name="monthly_hours"]');
    const preview = document.getElementById('monthly-preview');
    
    function updatePreview() {
        const rate = parseFloat(hourlyRate.value) || 0;
        const hours = parseFloat(monthlyHours.value) || 0;
        preview.textContent = `$${(rate * hours).toFixed(2)}`;
    }
    
    hourlyRate.addEventListener('input', updatePreview);
    monthlyHours.addEventListener('input', updatePreview);
</script>
{% endblock %}
