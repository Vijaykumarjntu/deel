{% extends 'core/base.html' %}
{% block title %}Pay Contractor{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
    <h1 class="text-2xl font-bold mb-4">Pay {{ contractor.full_name }}</h1>
    
    <div class="bg-gray-50 p-4 rounded mb-4">
        <p><strong>Country:</strong> {{ contractor.get_country_display }}</p>
        <p><strong>Bank Account:</strong> {{ contractor.bank_account_name }}</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Amount (USD)</label>
            <input type="number" name="amount" step="0.01" min="1" required 
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        
        <button type="submit" class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600">
            Proceed to Payment
        </button>
    </form>
    
    <a href="{% url 'contractor_list' %}" class="block text-center mt-4 text-gray-600">← Cancel</a>
</div>
{% endblock %}
