<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #10b981; color: white; padding: 20px; text-align: center; border-radius: 5px; }
        .content { padding: 20px; background: #f9fafb; border-radius: 5px; margin-top: 20px; }
        .button { display: inline-block; background: #10b981; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; margin-top: 20px; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✅ Contract Signed!</h1>
    </div>
    <div class="content">
        <p>Hello <strong>{{ company.name }}</strong>,</p>
        
        <p><strong>{{ contractor.full_name }}</strong> has signed the contract:</p>
        
        <div style="background: white; padding: 15px; border-radius: 5px; margin: 15px 0;">
            <h3 style="margin-top: 0;">{{ contract.title }}</h3>
            <p><strong>Signed at:</strong> {{ contract.signed_at|date:"F j, Y H:i" }}</p>
        </div>
        
        <p>The contract is now legally binding and active.</p>
        
        <div style="text-align: center;">
            <a href="{{ view_url }}" class="button">📄 View Contract</a>
        </div>
    </div>
    <div class="footer">
        <p>MiniDeel — Global Contractor Management</p>
    </div>
</div>
</body>
</html>
